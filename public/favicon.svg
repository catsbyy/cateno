<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0D0D0D"/>
  <!-- Mark scaled to fit: original mark spans x:0–55, y:0–32 (centred on y=16).
       Scale 0.5 → 27.5×16px content; translate to centre in 32×32. -->
