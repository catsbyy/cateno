<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 215 32" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Mark: left filled node → edge → arrowhead → right outlined node -->
  <circle cx="10" cy="16" r="10" fill="#E8E3D5"/>
  <line x1="20" y1="16" x2="38" y2="16" stroke="#E8E3D5" stroke-width="1.5"/>
  <!-- Solid filled arrowhead, tip at x=41 (flush with circle stroke centre) -->
  <path d="M34,11 L41,16 L34,21 Z" fill="#E8E3D5"/>
  <circle cx="48" cy="16" r="7" fill="none" stroke="#E8E3D5" stroke-width="1.5"/>

  <!-- Wordmark: 16px gap after mark (mark ends at x=55) -->
  <text
    x="71"
    y="16"
    dominant-baseline="middle"
    font-family="'Playfair Display', Georgia, serif"
    font-size="22"
    fill="#E8E3D5"
    style="letter-spacing: 0.08em"
  >Cateno</text>
</svg>
