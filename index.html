<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Cateno — A Cause-and-Effect History Explorer</title>
    <meta
      name="description"
      content="Explore how history actually happened. Follow the chain of causes and consequences across different scenarios — from the Knights Templar to the Wright Brothers, the French Revolution to the first flight."
    />
    <meta name="theme-color" content="#0D0D0D" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cateno.app" />
    <meta property="og:title" content="Cateno — A Cause-and-Effect History Explorer" />
    <meta
      property="og:description"
      content="Explore how history actually happened. Follow the chain of causes and consequences — from the Knights Templar to the Wright Brothers."
    />
    <meta property="og:image" content="https://cateno.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Cateno" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://cateno.app" />
    <meta name="twitter:title" content="Cateno — A Cause-and-Effect History Explorer" />
    <meta
      name="twitter:description"
      content="Explore how history actually happened. Follow the chain of causes and consequences — from the Knights Templar to the Wright Brothers."
    />
    <meta name="twitter:image" content="https://cateno.app/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://cateno.app" />

    <!-- Fonts — preconnect first, then stylesheet (avoids render-blocking @import in CSS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@400;500&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
